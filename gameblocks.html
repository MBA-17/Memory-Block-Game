<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Blocks Game</title>
    <link rel="stylesheet" type="text/css" href="gameblock.css">
</head>
<body>

    <div class="start_screen">
        <button class="start-btn" type="button">Enter Your Name</button>
    </div>

    <div class="userName hideScreen">
        <div class="set_name">
            <label for="username"></label>
            <div class="name_field">
                <input id="username" name="username" placeholder="Enter Your Name" autocomplete="given-name" type="text" />
                <button class="name_btn" type="submit">start game</button>
            </div>
            
        </div>
    </div>
    <div class="box-pos">
        <div class="game_container">
            <!-- Game Infos -->
            <div class="game-block-info">
                <div class="name">
                    Hello: <span></span>
                </div>
                <div class="tries">
                    Wrong Tries: <span>0</span>
                </div>
            </div>
            
            <!-- Game Block -->
            <div class="game-block-container">
                <!--Monster-->
                <div class="game-blocks" data-character="monster">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/monster.png" alt="yellow monster">
                    </div>
                </div>

                <div class="game-blocks" data-character="monster">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/monster.png" alt="yellow monster">
                    </div>
                </div>

                <!--vintage-->
                <div class="game-blocks" data-character="vintage">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/vintage.png" alt="vintage">
                    </div>
                </div>

                <div class="game-blocks" data-character="vintage">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/vintage.png" alt="vintage">
                    </div>
                </div>

                <!--traveller-->
                <div class="game-blocks" data-character="traveller">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/traveller.png" alt="traveller">
                    </div>
                </div>

                <div class="game-blocks" data-character="traveller">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/traveller.png" alt="traveller">
                    </div>
                </div>

                <!--michaelangelo-->
                <div class="game-blocks" data-character="michaelangelo">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/michaelangelo.png" alt="michaelangelo">
                    </div>
                </div>

                <div class="game-blocks" data-character="michaelangelo">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/michaelangelo.png" alt="michaelangelo">
                    </div>
                </div>

                <!--gloat-->
                <div class="game-blocks" data-character="gloat">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/gloat.png" alt="gloat">
                    </div>
                </div>

                <div class="game-blocks" data-character="gloat">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/gloat.png" alt="gloat">
                    </div>
                </div>

                <!--Approval-->
                <div class="game-blocks" data-character="approval">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/approval.png" alt="approval">
                    </div>
                </div>

                <div class="game-blocks" data-character="approval">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/approval.png" alt="approval">
                    </div>
                </div>

                <!--monster 2-->
                <div class="game-blocks" data-character="monster_2">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/monster_2.png" alt="monster 2">
                    </div>
                </div>

                <div class="game-blocks" data-character="monster_2">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/monster_2.png" alt="monster 2">
                    </div>
                </div>

                <!--very happy-->
                <div class="game-blocks" data-character="veryhappy">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/very-happy.png" alt="very happy">
                    </div>
                </div>

                <div class="game-blocks" data-character="veryhappy">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/very-happy.png" alt="very happy">
                    </div>
                </div>

                <!--hand-->
                <div class="game-blocks" data-character="hand">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/hand_.png" alt="hand">
                    </div>
                </div>

                <div class="game-blocks" data-character="hand">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/hand_.png" alt="hand">
                    </div>
                </div>

                <!--egg-->
                <div class="game-blocks" data-character="egg">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/egg.png" alt="egg">
                    </div>
                </div>

                <div class="game-blocks" data-character="egg">
                    <div class="face front"></div>
                    <div class="face back">
                        <img src="images/egg.png" alt="egg">
                    </div>
                </div>

            </div>

            <!-- Restart Button -->
            <div id="restart-btn">
                <svg viewBox="-7.5 0 32 32">
                    <path d="M15.88 13.84c-1.68-3.48-5.44-5.24-9.040-4.6l0.96-1.8c0.24-0.4 0.080-0.92-0.32-1.12-0.4-0.24-0.92-0.080-1.12 0.32l-1.96 3.64c0 0-0.44 0.72 0.24 1.040l3.64 1.96c0.12 0.080 0.28 0.12 0.4 0.12 0.28 0 0.6-0.16 0.72-0.44 0.24-0.4 0.080-0.92-0.32-1.12l-1.88-1.040c2.84-0.48 5.8 0.96 7.12 3.68 1.6 3.32 0.2 7.32-3.12 8.88-1.6 0.76-3.4 0.88-5.080 0.28s-3.040-1.8-3.8-3.4c-0.76-1.6-0.88-3.4-0.28-5.080 0.16-0.44-0.080-0.92-0.52-1.080-0.4-0.080-0.88 0.16-1.040 0.6-0.72 2.12-0.6 4.36 0.36 6.36s2.64 3.52 4.76 4.28c0.92 0.32 1.84 0.48 2.76 0.48 1.24 0 2.48-0.28 3.6-0.84 4.16-2 5.92-7 3.92-11.12z"/>
                </svg>
            </div>

        </div>
    </div>

    <!-- Win Screen -->
    <div id="win-screen">
        <div class="win-content">
            <h1>🎉 YOU WIN!</h1>
            <p>Wrong Tries: <span id="final-tries"></span></p>
            <button id="play-again">Play Again</button>
        </div>
    </div>
    
    <!--Sound effect-->
    <audio id="success-sound" src="sounds/fairy-cartoon-success.wav"></audio>
    <audio id="fail-sound" src="sounds/game-show-wrong-answer-buzz.wav"></audio>
    <audio id="win-sound" src="sounds/player-game-win.wav"></audio>

    <script src="gameblock.js" defer></script>

</body>
</html>
